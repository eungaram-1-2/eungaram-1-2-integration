<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>오프라인 - 은가람중 1-2반</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
    <link rel="stylesheet" href="/style.min.css">
    <style>
        /* ===== offline 전용 스타일 ===== */

        /* 배경 */
        .offline-bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .offline-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
        }

        .offline-orb-1 {
            width: 500px;
            height: 500px;
            top: -180px;
            right: -100px;
            background: radial-gradient(circle, rgba(239,68,68,0.18), rgba(239,68,68,0));
        }

        .offline-orb-2 {
            width: 400px;
            height: 400px;
            bottom: -120px;
            left: -80px;
            background: radial-gradient(circle, rgba(20,40,160,0.14), rgba(20,40,160,0));
        }

        [data-theme="dark"] .offline-orb-1 {
            opacity: 0.8;
        }

        [data-theme="dark"] .offline-orb-2 {
            opacity: 0.7;
        }

        /* 페이지 레이아웃 */
        .offline-page {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        /* fade-in 애니메이션 */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .fade-in-d1 { animation-delay: 0.05s; }
        .fade-in-d2 { animation-delay: 0.15s; }
        .fade-in-d3 { animation-delay: 0.25s; }
        .fade-in-d4 { animation-delay: 0.35s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* WiFi 끊김 아이콘 컨테이너 */
        .wifi-icon-wrapper {
            width: 96px;
            height: 96px;
            border-radius: 28px;
            background: linear-gradient(135deg, rgba(239,68,68,0.12), rgba(239,68,68,0.06));
            border: 1.5px solid rgba(239,68,68,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            position: relative;
        }

        [data-theme="dark"] .wifi-icon-wrapper {
            background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.08));
            border-color: rgba(239,68,68,0.25);
        }

        .wifi-icon-wrapper::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 36px;
            background: radial-gradient(circle, rgba(239,68,68,0.07), transparent 70%);
            animation: icon-pulse 3s ease-in-out infinite;
        }

        @keyframes icon-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.06); opacity: 0.6; }
        }

        .wifi-svg {
            width: 48px;
            height: 48px;
            color: #ef4444;
        }

        [data-theme="dark"] .wifi-svg {
            color: #f87171;
        }

        /* 텍스트 */
        .offline-title {
            font-size: clamp(1.3rem, 4vw, 1.75rem);
            font-weight: 800;
            color: var(--text);
            margin-bottom: 10px;
            letter-spacing: -0.4px;
        }

        .offline-desc {
            font-size: clamp(0.875rem, 2.5vw, 1rem);
            color: var(--text-muted);
            max-width: 340px;
            line-height: 1.8;
            margin-bottom: 36px;
        }

        /* 상태 칩 */
        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.18);
            color: #ef4444;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 5px 14px;
            border-radius: 999px;
            margin-bottom: 28px;
            letter-spacing: 0.01em;
        }

        [data-theme="dark"] .status-chip {
            background: rgba(239,68,68,0.12);
            border-color: rgba(239,68,68,0.25);
            color: #f87171;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #ef4444;
            animation: status-blink 2s ease-in-out infinite;
        }

        [data-theme="dark"] .status-dot {
            background: #f87171;
        }

        @keyframes status-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.25; }
        }

        /* 버튼 그룹 */
        .offline-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #1428A0, #2563eb);
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 14px 28px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 4px 20px rgba(20, 40, 160, 0.3);
            font-family: inherit;
        }

        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(20, 40, 160, 0.45);
        }

        .btn-retry:active {
            transform: translateY(0);
        }

        .btn-retry svg {
            transition: transform 0.4s ease;
        }

        .btn-retry:hover svg {
            transform: rotate(180deg);
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.95rem;
            padding: 14px 28px;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            font-family: inherit;
        }

        .btn-back:hover {
            border-color: var(--primary-light);
            color: var(--primary);
            background: var(--primary-bg);
            transform: translateY(-2px);
        }

        /* 팁 박스 */
        .offline-tips {
            margin-top: 48px;
            padding: 20px 24px;
            border-radius: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            max-width: 340px;
            width: 100%;
            text-align: left;
        }

        .offline-tips h3 {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .offline-tips ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .offline-tips li {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: flex-start;
            gap: 8px;
            line-height: 1.6;
        }

        .offline-tips li::before {
            content: '·';
            color: var(--primary-light);
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* 하단 브랜딩 */
        .offline-brand {
            margin-top: 40px;
            font-size: 0.78rem;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .offline-brand strong {
            color: var(--primary);
            opacity: 1;
        }

        /* 반응형 */
        @media (max-width: 480px) {
            .offline-actions {
                flex-direction: column;
                width: 100%;
                max-width: 300px;
            }

            .btn-retry,
            .btn-back {
                justify-content: center;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 배경 -->
    <div class="offline-bg" aria-hidden="true">
        <div class="offline-orb offline-orb-1"></div>
        <div class="offline-orb offline-orb-2"></div>
    </div>

    <!-- 오프라인 컨텐츠 -->
    <main class="offline-page">
        <!-- WiFi 끊김 아이콘 (SVG 인라인) -->
        <div class="wifi-icon-wrapper fade-in" aria-hidden="true">
            <svg class="wifi-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <!-- WiFi 아크들 (연결 끊김 표현) -->
                <path d="M1 6C3.7 3.7 7.2 2 12 2c4.8 0 8.3 1.7 11 4" opacity="0.3"/>
                <path d="M4.4 9.4C6.4 7.7 9 6.5 12 6.5s5.6 1.2 7.6 2.9" opacity="0.3"/>
                <path d="M7.8 12.8C9.1 11.7 10.5 11 12 11s2.9.7 4.2 1.8" opacity="0.3"/>
                <!-- X 표시 -->
                <line x1="9" y1="9" x2="15" y2="15"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <!-- 하단 점 -->
                <circle cx="12" cy="19" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
        </div>

        <!-- 상태 칩 -->
        <div class="status-chip fade-in fade-in-d1">
            <span class="status-dot"></span>
            오프라인
        </div>

        <h1 class="offline-title fade-in fade-in-d2">인터넷 연결을 확인해주세요</h1>

        <p class="offline-desc fade-in fade-in-d3">
            네트워크에 연결되어 있지 않습니다.<br>
            Wi-Fi 또는 모바일 데이터를 확인한 후<br>
            다시 시도해주세요.
        </p>

        <div class="offline-actions fade-in fade-in-d4">
            <button onclick="window.location.reload()" class="btn-retry">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                다시 시도
            </button>
            <button onclick="history.back()" class="btn-back">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                이전 페이지
            </button>
        </div>

        <!-- 팁 -->
        <div class="offline-tips fade-in fade-in-d4">
            <h3>확인해보세요</h3>
            <ul>
                <li>Wi-Fi 또는 모바일 데이터가 켜져 있는지 확인하세요</li>
                <li>비행기 모드가 꺼져 있는지 확인하세요</li>
                <li>라우터를 재시작해보세요</li>
            </ul>
        </div>

        <p class="offline-brand fade-in fade-in-d4">
            <strong>은가람중학교 1-2반</strong> &nbsp;·&nbsp; 통합 사이트
        </p>
    </main>

    <script>
        // 다크모드 즉시 적용 (FOUC 방지)
        (function() {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();

        // 온라인 상태 감지 시 홈으로 자동 리다이렉트
        window.addEventListener('online', function() {
            // 잠깐 대기 후 리다이렉트 (연결 안정화)
            setTimeout(function() {
                window.location.href = '/';
            }, 800);
        });

        // 현재 이미 온라인이면 바로 홈으로
        if (navigator.onLine) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
